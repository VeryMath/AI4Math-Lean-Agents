display_name: AI4Math Lean Agents
short_description: Interactive Lean 4 verification through the official Numina Lean Agent runtime with reusable mathlib workspaces.
default_prompt: 请用中文开始并主动引导 Lean 会话；如果用户明确使用其他语言，再切换到用户语言。Lean Agent 默认指 Numina 官方 Lean Agent runtime，不要把 coding agent 重新定义成 Lean Agent。先检查 Numina readiness、共享 workspace、Claude/API 凭据和本地 Lean 验收能力，再推荐下一步。没有用户目标时先使用内置 smoke-test 验证本地 Lean/mathlib 验收链路。不要在 Numina 模式明确前说 API key 不需要。用户任务默认使用共享 Lean workspace；upstream Numina 示例只是 demo，可能 pin 不同 toolchain。一次最多问一个阻塞问题。coding agent 负责部署、配置、调用 Numina，并用本地 Lean/Lake 验收结果；direct Lean 只是验证或 fallback。
