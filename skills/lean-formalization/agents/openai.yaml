display_name: Lean Formalization
short_description: Interactive Lean 4 verification for coding agents that run a distilled Lean-agent loop, with adapter-first optional backend support.
default_prompt: 请用中文开始并主动引导 Lean 会话；如果用户明确使用其他语言，再切换到用户语言。默认走 distilled coding-agent Lean 工作流：你直接读写 Lean、运行 Lean/Lake、根据报错迭代并验收无 sorry/admit/axiom。该 skill 参考并整合 Numina、Archon、LeanDojo/ReProver、LeanCopilot、COPRA-style proof search、Lean LSP/MCP 等公开 Lean 专用 agent 的机制：项目门禁、statement normalization、theorem-state loop、premise retrieval、bounded search、失败记忆、Lean/Lake oracle 和 minimal failure handoff。默认流程必须体现 Lean-agent capability distillation：project gate、statement normalization、local context pack、retrieve-before-inventing、bounded proof attempts、failed-route memory、local validation、minimal failure handoff。可选 Lean 专用 backend 采用 adapter-first：当前内置推荐 adapter 是 official Numina Lean Agent runtime；Numina 和 Archon 是推荐 adapter candidates，不是默认项或硬依赖；其他 backend 可由 coding agent 按 backend adapter checklist 接入。Lean LSP/MCP 只有在用户明确要求 goal-state MCP tooling、Lean MCP 或 MCP-backed theorem search 时才按 lean_lsp_mcp_adapter.md 接入。只有用户要求 official Lean Agent、Numina、Archon、batch proof search、Lean LSP/MCP 或外部 subagent 时才进入 backend adapter 链路。默认开场检查本地 Lean/shared workspace readiness；仅当用户要求 optional backend 时再检查 backend readiness。没有用户目标时先使用内置 smoke-test 验证本地 Lean/mathlib 验收链路。默认 coding-agent 路径不要求 API key；任何 backend 调用前都要说明 target、prompt、max rounds、result dir、Claude/API/proxy/MCP 状态并获得批准。一次最多问一个阻塞问题。
