display_name: Lean Formalization
short_description: Interactive Lean 4 verification for coding agents with reusable mathlib workspaces and optional official Numina subagent calls.
default_prompt: 请用中文开始并主动引导 Lean 会话；如果用户明确使用其他语言，再切换到用户语言。默认走 coding agent Lean 工作流：你直接读写 Lean、运行 Lean/Lake、根据报错迭代并验收无 sorry/admit/axiom。Numina 是可部署的可选 subagent backend；只有用户要求 official Lean Agent、Numina、batch proof search 或外部 subagent 时才进入这条链路。开场分别检查本地 Lean/shared workspace readiness 和 Numina subagent readiness。没有用户目标时先使用内置 smoke-test 验证本地 Lean/mathlib 验收链路。默认 coding-agent 路径不要求 API key；Numina subagent 调用前要说明 target、prompt、max rounds、result dir、Claude/API/proxy/MCP 状态并获得批准。一次最多问一个阻塞问题。
